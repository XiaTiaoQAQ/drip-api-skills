                  type: string
                  format: date
                  description: 日期
                options:
                  type: array
                  description: 关联组规格
                  items:
                    type: object
                    required:
                      - groupIndex
                      - option
                    properties:
                      groupIndex:
                        type: integer
                        description: 预约服务关联组索引
