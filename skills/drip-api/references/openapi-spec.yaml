                                    - 2
                                  description: |-
                                    状态
                                    - `0` 正常
                                    - `1`: 已过期
                                    - `2`: 已约完
                                remainCount:
                                  type: integer
                                  description: 剩余次数
                                originCount:
                                  type: integer
                                  description: 总数
  /booking/prepareBookingOrder:
    post:
      operationId: Booking_prepareBookingOrder
      summary: 获取下单信息
      description: 获取预约下单信息（价格等）
      tags:
        - 预约
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - customerId
                - bookingServiceId
                - date
                - timeSpans
                - withCardDiscount
              properties:
                customerId:
                  type: string
                  description: 客户id
                bookingServiceId:
                  type: integer
                  format: int64
                  description: 预约服务id
                date:
                  type: string
                  format: date
                  example: '2000-01-01'
                customer:
                  type: object
                  description: '预约客户信息,不传则使用系统客户信息'
                  required:
                    - name
                    - mobile
                  properties:
                    name:
                      type: string
                      description: 姓名
                    mobile:
                      type: string
                      description: 手机号
                    gender:
                      type: integer
                      enum:
                        - 1
                        - 2
                        - 3
                      description: |-
                        性别
                        - `1` 男
                        - `2` 女
                        - `3` 其他
                timeSpans:
                  type: array
                  description: 刻度key值
                  items:
                    type: string
                  example:
                    - '19:00'
                    - '20:00'
                services:
                  type: array
                  items:
                    type: object
                    required:
                      - id
                    properties:
                      id:
                        type: integer
                        format: int64
                        description: 服务项目id
                      count:
                        type: string
                        example: '1.25'
                        description: 服务项目数量（服务项目可以选择数量时传入）
                quantity:
                  type: integer
                  description: 预约的数量
                options:
                  type: array
                  description: 指定的预约关联组规格
                  items:
                    $ref: '#/paths/~1booking~1getSpans/post/requestBody/content/application~1json/schema/properties/options/items'
                withCardDiscount:
                  type: boolean
                  description: 是否使用会员折扣
      responses:
        '200':
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      success:
                        type: boolean
                        enum:
                          - true
                      result:
                        type: object
                        properties:
                          originalFee:
                            type: integer
                            description: 预约服务原价， 单位（分）
                          discountFee:
                            type: integer
                            description: 预约服务会员价， 单位（分），没有表示没有会员折扣
                          netFee:
                            type: integer
                            description: 预约服务价格（除去所有优惠）
                          payAmount:
                            type: integer
                            description: |-

                              预约订单支付的价格
                              - 全款预约则为 netFee
                              - 定金模式则为定金金额
                              - 不开启付费预约则为0
                  - $ref: '#/paths/~1tcard~1use/post/responses/200/content/application~1json/schema/oneOf/1'
        default:
          description: |-

            错误码
            * `26008` 客户在黑名单中
            * `26009` 可预约库存发生变化
            * `26010` 客户不满足预约条件
            * `26011` 客户储值余额不足
            * `26012` 未到开始预约时间
            * `26013` 已停止预约
            * `26014` 无效会员卡折扣
            * `26015` 无效优惠券
  /booking/createBookingOrder:
    post:
      operationId: Booking_createBookingOrder
      summary: 创建预约订单
      description: 根据下单信息创建订单
      tags:
        - 预约
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - prepare
                - feeInfo
                - extraFields
              properties:
                prepare:
                  description: 预约服务信息
                  $ref: '#/paths/~1booking~1prepareBookingOrder/post/requestBody/content/application~1json/schema'
                feeInfo:
                  description: 预约订单信息
                  $ref: '#/paths/~1booking~1prepareBookingOrder/post/responses/200/content/application~1json/schema/oneOf/0/properties/result'
                extraFields:
                  type: array
                  description: 预约填写字段
                  items:
                    type: object
                    required:
                      - id
                      - name
                      - value
                    properties:
                      id:
                        type: integer
                        format: int64
                        description: 字段 id
                      name:
                        type: string
                        description: 字段名称
                      value:
                        type: any
                        description: 预约字段值
                expireMinutes:
                  type: int
                  description: 订单多久后过期
                skipPriceCheck:
                  type: boolean
                  description: 不再校验价格，商户需自己保证价格安全
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                required:
                  - bookingOrderId
                properties:
                  bookingOrderId:
                    type: string
                    description: 预约订单 id
                  orderId:
                    type: string
                    description: '订单id, 需要支付时返回'
        default:
          description: |-
            错误码
            * `26001` 预约服务不存在
            * `26002` 预约客户不存在
            * `26003` 预约门店不存在
            * `26004` 预约参数非法
            * `26005` 锁场信息为空
            * `26007` 获取场地计费信息错误
            * `26008` 客户在黑名单中
            * `26009` 可预约库存发生变化
            * `26010` 客户不满足预约条件
            * `26011` 客户储值余额不足
            * `26012` 未到开始预约时间
            * `26013` 已停止预约
            * `26014` 无效会员卡折扣
            * `26015` 无效优惠券
  /booking/confirmPay:
    post:
      operationId: bookingConfirmPay
      summary: 确认支付成功
      description: 商户系统确认支付成功后通过该接口修改智店预约订单状态
      tags:
        - 预约
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - orderId
                - bookingOrderId
                - payTime
                - payType
              properties:
                orderId:
                  type: string
                  description: 订单号
                bookingOrderId:
                  description: 预约单号
                  type: string
                payTime:
                  description: 用户支付时间
                  type: string
                  example: '2000-01-01 00:00:00'
                payType:
                  description: 支付方式，对应智店后台自定义支付方式
                  type: string
                  example: 自定义收款方式
      responses:
        '200':
          description: 订单确认结果
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
