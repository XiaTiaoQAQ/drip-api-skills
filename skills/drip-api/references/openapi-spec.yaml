  /booking/playground/getBookingRecords:
    post:
      operationId: BookingPlayGround_getBookingRecords
      summary: 获取场地预约记录
      description: 获取指定场地未开始的预约记录列表
      tags:
        - 场地
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - playgroundId
