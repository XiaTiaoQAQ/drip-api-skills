  /order/countByCustomer:
    post:
      tags:
        - 订单
      summary: 根据客户查询订单数量
      operationId: order_countByCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - customerId
                - types
              properties:
                customerId:
                  type: string
                  description: 客户ID
                type:
                  type: integer
                  description: |
                    订单类型

                      10 = 会员卡购买

                      11 = 会员卡升级

                      12 = 储值

                      13 = 预约

                      14 = 会员卡续费

                      15 = 次卡购买-自助

                      16 = 线下收银

                      18 = 次卡购买-商家移动端售卖

                      19 = 商城购买

                      20 = 拼团

                      21 = 消费补录

                      22 = 线上购买课程

                      24 = 积分兑换

                      25 = 跨店下单

                      26 = 门禁（会员）

                      29 = 赛事报名

                      30 = 班级报名

                      34 = 自助售票机

                      37 = 开台

                      39 = 手牌消费
                subType:
                  type: integer
                  format: int32
                  description: |
                    收银订单子类型:

                    null (普通收银订单)

                    1 (收银出票订单)

                    2 (收银超时补费)

                    3 (补费机超时补费)

                    4,5,...(其他类型)
                payType:
                  type: integer
                  format: int32
                  description: |
                    支付方式

                      1 = 微信

                      2 = 支付宝

                      3 = 现金

                      4 = 银联

                      5 = 储值卡

                      6 = 外部自定义支付

                      7 = 押金
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                      - true
                  result:
                    type: integer
                    description: 数量
  /booking/playground/getAll:
