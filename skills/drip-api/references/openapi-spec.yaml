      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - id
              type: object
              properties:
                id:
                  description: 客户id
                  type: string
                fields:
                  description: |-
                    须更新的内置属性 `{"key1": value1, "key2":value2}` (json object 格式)。支持更新的属性
                    * `realName` 真实姓名
                    * `remarkName` 用户备注
                    * `gender` 性别
                    * `birth` 生日
                    * `province` 省
                    * `city` 市
                    * `district` 区
                    * `adress` 地址
                    * `nickName` 昵称
                    * `avatar` 头像
                  type: object
                  additionalProperties:
                    type: any
                extFields:
                  type: object
                  additionalProperties:
                    type: any
                  description: '须更新的自定义属性 `{"key1": value1, "key2":value2}` (json object 格式)。支持更新的属性可通过获取自定义属性接口读取'
      responses:
        '200':
          description: 操作结果
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      success:
                        type: boolean
                        enum:
                          - true
                      result:
                        type: object
                  - $ref: '#/paths/~1tcard~1use/post/responses/200/content/application~1json/schema/oneOf/1'
        default:
          description: |-
            错误码
            * 23001 客户不存在
            * 23003 属性不存在或不支持更新
            * 23004 属性值格式错误
