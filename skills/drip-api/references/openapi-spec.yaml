                  description: 最小开始时间，默认当前时间
                playgroundId:
                  type: integer
                  description: 场地id
                nextRecordSize:
                  type: integer
                  description: 读取未开始到预约记录条数
      responses:
        '200':
          description: 使用记录结果
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      success:
                        type: boolean
                        enum:
                          - true
                      result:
                        type: object
                        required:
                          - data
                        properties:
                          data:
                            type: array
                            items:
                              type: object
                              required:
                                - id
                                - customerId
                                - customerMobile
                                - startAt
                                - endAt
                                - extraFields
                              properties:
                                id:
                                  type: integer
                                  description: 场地预约记录id
                                customerId:
                                  type: string
                                  description: 预约客户id
                                customerName:
                                  type: string
                                  description: 预约客户姓名
                                customerMobile:
                                  type: string
                                  description: 预约客户手机号
                                startAt:
                                  type: string
                                  example: '2022-01-01 00:00:00'
                                endAt:
                                  type: string
                                  example: '2022-01-01 00:00:00'
                                extraFields:
                                  type: object
                                  description: 预约填写字段
                                  example:
                                    - 人数: 3
                                    - 是否订餐: true
                  - $ref: '#/paths/~1tcard~1use/post/responses/200/content/application~1json/schema/oneOf/1'
        default:
          description: |
            错误码
  /people/getStat:
    post:
      operationId: People_getStat
      summary: 获取客流统计
      description: 获取指定场馆或总人流的实时统计信息，包括当前人数、限制人数和拥挤程度。
      tags:
        - 客流
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                locationId:
                  type: integer
                  format: int64
                  description: 场馆ID (可选，不填则获取总人流统计)
      responses:
        '200':
          description: 人流统计结果
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      success:
                        type: boolean
                        enum:
                          - true
                      result:
                        type: object
                        required:
                          - currentNum
                          - peopleLimitNum
                          - crowding
                        properties:
                          currentNum:
                            type: integer
                            description: 当前人数
                          peopleLimitNum:
                            type: integer
                            description: 人流限制数量
                          crowding:
                            type: string
                            description: 拥挤程度
                            enum:
                              - low
                              - medium
                              - high
                              - full
                  - $ref: '#/paths/~1tcard~1use/post/responses/200/content/application~1json/schema/oneOf/1'
        default:
          description: 错误码
webhooks:
  BookingOrderStatusChange:
    post:
      summary: 预约订单状态变更
      description: 预约订单状态发生变更时推送提醒
      requestBody:
        description: 提醒消息
        content:
          application/json:
            schema:
              type: object
              required:
                - eventType
                - payload
              properties:
                eventType:
                  type: string
                  enum:
                    - BookingOrderStatusChange
                payload:
                  type: object
                  required:
                    - id
                    - status
                  properties:
                    id:
                      type: string
                      description: 预约订单id
                    status:
                      type: integer
                      enum:
                        - 0
                        - 1
                        - 2
                        - 3
                        - -1
                        - -2
                        - -3
                        - -5
                      description: |-

                        * `0` - 待支付
                        * `1` - 预约成功
                        * `2` - 已开单
                        * `3` - 已完成
                        * `-1` - 订单未支付超时关闭
                        * `-2` - 订单已取消
                        * `-3` - 订单已过期
                        * `-5` - 课程缺课
  BookingPlayGroundOccupyStatusChange:
    post:
      summary: 场地状态变更提醒
      description: 场地状态变更时推送
      requestBody:
        description: 提醒消息
        content:
          application/json:
            schema:
              type: object
              required:
                - eventType
                - payload
              properties:
                eventType:
                  type: string
                  enum:
                    - BookingPlayGroundOccupyStatusChange
                payload:
                  type: object
                  required:
                    - playgroundId
                    - status
                    - startAt
                    - endAt
                  properties:
                    playgroundId:
                      type: integer
                      description: 场地ID
                    startAt:
                      type: string
                      example: '2000-01-01 00:00:00'
                    endAt:
                      type: string
                      example: '2000-01-01 00:00:00'
                    status:
                      type: integer
                      enum:
                        - 1
                        - -1
                      description: |-

                        * `1` 已占用
                        * `-1` 已取消占用
  BookingOrderInfoChange:
    post:
      summary: 预约订单信息变更
      description: 预约订单信息发生变更（用户填写字段和改期）时通知
      requestBody:
        description: 提醒消息
        content:
          application/json:
            schema:
              type: object
              required:
                - eventType
                - payload
              properties:
                eventType:
                  type: string
                  enum:
                    - BookingOrderInfoChange
                payload:
                  type: object
                  required:
                    - id
                    - status
                  properties:
                    id:
                      type: string
                      description: 预约订单id
                    modifyTime:
                      type: string
                      description: 更新时间
                    modifyType:
                      type: integer
                      enum:
                        - 1
                        - 2
                      description: |-
                        修改类型
                        * `1` - 更新字段
                        * `2` - 改期
