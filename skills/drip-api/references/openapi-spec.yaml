                              规格类型
                              * `1` : 场地规格
                          optionId:
                            type: integer
                            description: 规格id
                          optionGroupId:
                            type: integer
                            description: 规格组id
                          optionName:
                            type: string
                            description: 规格名称
                          optionGroupName:
                            type: string
                            description: 规格组名称
