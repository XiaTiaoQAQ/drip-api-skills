                playgroundId:
                  type: integer
                  description: 场地id
                nextRecordSize:
                  type: integer
                  description: 读取未开始到预约记录条数
      responses:
        '200':
          description: 使用记录结果
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      success:
                        type: boolean
                        enum:
                          - true
                      result:
                        type: object
                        required:
                          - data
                        properties:
                          data:
                            type: array
                            items:
                              type: object
                              required:
                                - id
                                - customerId
                                - customerMobile
                                - startAt
                                - endAt
                                - extraFields
                              properties:
                                id:
                                  type: integer
                                  description: 场地预约记录id
                                customerId:
                                  type: string
                                  description: 预约客户id
                                customerName:
                                  type: string
                                  description: 预约客户姓名
                                customerMobile:
                                  type: string
                                  description: 预约客户手机号
                                startAt:
                                  type: string
                                  example: '2022-01-01 00:00:00'
                                endAt:
                                  type: string
                                  example: '2022-01-01 00:00:00'
                                extraFields:
                                  type: object
                                  description: 预约填写字段
                                  example:
                                    - 人数: 3
                                    - 是否订餐: true
